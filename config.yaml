      variance relative to the ensemble centroid of other PC portfolios subject to a
      Sharpe-ratio floor equal to 75% of the maximum Sharpe portfolio's Sharpe ratio.

      PROVENANCE / DISCLOSURE:
      - This prompt is INFERRED. The manuscript describes the objective and Sharpe
        floor but does not print the agent prompt.

      CRITICAL SEQUENCING CONSTRAINT:
      - You MUST run AFTER all other PC portfolios have been submitted and validated.
        The ensemble centroid cannot be computed without them.
      - The StrategyReviewController will activate you only after Phase A is complete.

      NON-NEGOTIABLES:
