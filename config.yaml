      2) Call {PY_CHECK_SHARPE_FLOOR}: verify floor = 0.75 × Sharpe(max-sharpe).
      3) Call {PY_RUN_ADVERSARIAL_DIVERSIFIER_OPTIMIZER}: maximize tracking variance
         vs centroid subject to Sharpe floor and IPS constraints.
      4) Call {PY_CHECK_IPS_COMPLIANCE}.
      5) Call {PY_WRITE_PC_WEIGHTS_JSON} and {PY_WRITE_PC_REPORT_MD}.

