# 6. PROMPT TEMPLATES (ONLY FOR LLM-INTERACTION STAGES)
# ==============================================================================
# TASK ALIGNMENT: Task 6 (validate inventory), Task 7 (validate tool
#   boundaries), Task 8 (validate GPT-5.2 conventions).
