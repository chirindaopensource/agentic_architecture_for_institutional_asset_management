      classify_dispersion: "{SCRIPTS_DIR}/cma_judge/classify_dispersion.py"
      check_regime_logic: "{SCRIPTS_DIR}/cma_judge/check_regime_logic.py"
      check_valuation_thresholds: "{SCRIPTS_DIR}/cma_judge/check_valuation_thresholds.py"
      check_signal_alignment: "{SCRIPTS_DIR}/cma_judge/check_signal_alignment.py"
      enforce_range_constraint: "{SCRIPTS_DIR}/cma_judge/enforce_range_constraint.py"
      write_cma_json: "{SCRIPTS_DIR}/cma_judge/write_cma_json.py"
    # Outputs written to CMA judge dir (separate from AC agent dir):
    output_artifact_dir_template: "{RUN_OUTPUT_BASE_DIR}/cma_judge/{asset_class_slug}/"
    output_artifacts_template:
      cma_json: "{RUN_OUTPUT_BASE_DIR}/cma_judge/{asset_class_slug}/cma.json"
    output_schemas:
      cma_json: "{SCHEMAS_DIR}/cma.schema.json"
    # Hard constraint verification (dual-layer gate):
    range_constraint_gate:
      layer_1: "within_react_loop_via_enforce_range_constraint_tool"
      layer_2: "post_hoc_arithmetic_check_on_persisted_cma_json"
      on_failure: "raise_RuntimeError_halt_pipeline"
    # CMA Judge runs for ALL 18 asset classes
    # (equity methods 1-7 for equity; FI builder for FI;
    # applicable methods for real assets and cash)
    applies_to_asset_classes: "ALL_18"

  # ----------------------------------------------------------------------------
  # 5.4 COVARIANCE AGENT REGISTRY (Task 24)
