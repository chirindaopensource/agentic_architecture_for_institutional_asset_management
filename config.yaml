# ==============================================================================
# SELF-DRIVING PORTFOLIO: GLOBAL STUDY CONFIGURATION (IMPLEMENTATION-GRADE)
# ==============================================================================

STUDY_ID: "self-driving-portfolio-march-2026"
# Rational placeholder; exact as-of date not stated (UNSPECIFIED IN MANUSCRIPT)
AS_OF_DATE: "2026-03-31"
RANDOM_SEEDS:
  # Must be recorded in run manifest for full reproducibility.
  # Values are placeholders; not stated in manuscript (UNSPECIFIED IN MANUSCRIPT).
  peer_review_assignment_seed: 12345  # Task 28: deterministic review assignment
  resampling_seed: 67890              # Task 25: Michaud/resampled EF
  optimizer_seed: 24680               # Task 25/26: stochastic solvers if used
  robustness_seed: 11111              # Task 35/36: robustness run ordering

# ==============================================================================
# 1. ENVIRONMENT & LLM INFRASTRUCTURE PARAMETERS
# ==============================================================================
# TASK ALIGNMENT:
#   Task 2  — Validates and freezes LLM call contract (Responses API).
#   Task 8  — Validates GPT-5.2 prompting conventions and freezes effort
#             schedule.
#   Tasks 17,18,22,27 — ReAct framework; single-agent Responses API loops.
#   Tasks 19,28,29,30,31,36 — AutoGen framework; multi-agent orchestration.
# ==============================================================================
INFRASTRUCTURE:

  # ----------------------------------------------------------------------------
  # 1.1 FRAMEWORK ASSIGNMENTS (per task; frozen implementation contract)
  # ----------------------------------------------------------------------------
  # ReAct (Yao et al. 2023): prescribed for single-agent, tool-augmented
  #   reasoning loops requiring explicit reasoning traces and arithmetic
  #   delegation to scripts.
  # AutoGen (Wu et al. 2023): prescribed for multi-agent orchestration
  #   requiring role-differentiated agents, synchronisation barriers,
  #   parallel dispatch, and artifact-passing topologies.
  AGENT_FRAMEWORK_ASSIGNMENTS:
    task_17_macro_agent:
      framework: "ReAct"
      citation: "Yao et al. 2023"
      rationale: >-
        Single-agent tool-augmented reasoning loop.
        Requires explicit reasoning traces for audit.
        All arithmetic delegated to registered script tools.
        No inter-agent coordination required at this stage.
    task_18_ac_agents:
      framework: "ReAct"
      citation: "Yao et al. 2023"
      rationale: >-
        Independent single-agent loops per asset class.
        Parallelisable via ThreadPoolExecutor.
        No inter-agent coordination required during CMA production.
        FI and equity agents use different tool sets.
    task_19_strategy_review_topology:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        Multi-agent system with 21+ role-differentiated agents.
        Requires ConversableAgent per role, GroupChatManager
        as StrategyReviewController, sequential phase topology
        (A→B→C→D→E→F→G), artifact-passing file contracts,
        and fail-closed schema validation between phases.
    task_22_cma_judge:
      framework: "ReAct"
      citation: "Yao et al. 2023"
      rationale: >-
        Single LLM-as-judge per asset class.
        Exhibit 4 algorithm enforced via mandatory tool-call
        sequence. Dual-layer range constraint gate.
        No inter-agent coordination required.
    task_27_cro_narrative:
      framework: "ReAct"
      citation: "Yao et al. 2023"
      rationale: >-
        Single-agent CRO narrative per candidate portfolio.
        All metrics computed by script tools.
        LLM generates narrative interpretation only.
        21 independent loops parallelised by AutoGen controller.
    task_28_peer_review:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        21 PC ConversableAgents dispatched in parallel.
        Synchronisation barrier: all 42 reviews must complete
        before any are released. Simultaneous release enforced
        by StrategyReviewController.
    task_29_voting:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        21 PC ConversableAgents vote simultaneously.
        Forced tool_choice={'type':'function','name':'submit_vote'}.
        Borda aggregation and composite ranking are scripted.
        Voting barrier: all 21 votes required before aggregation.
    task_30_top5_revision:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        Selective dispatch to top-5 PC ConversableAgents only.
        Diversity constraint enforced by scripted callable.
        Revised weights trigger CRO re-run via controller.
    task_31_cio_agent:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        CIO apex ConversableAgent at terminal node of AutoGen
        topology. Pre-flight artifact gate enforced by controller.
        xhigh reasoning effort. 7 ensemble methods evaluated by
        scripts. Board memo generated by LLM.
    task_36_robustness_llm:
      framework: "AutoGen"
      citation: "Wu et al. 2023"
      rationale: >-
        Full AutoGen topology re-instantiated per robustness config.
        One-at-a-time protocol perturbation.
        Drift measured by scripted comparators across run dirs.

  # ----------------------------------------------------------------------------
  # 1.2 LLM INVOCATION POLICY (frozen; Task 2 and Task 8)
  # ----------------------------------------------------------------------------
  # This is the implementation contract for all GPT-5.2 Responses API
  # calls. temperature, top_p, and max_tokens are NOT used — they are
  # inapplicable for GPT-5.2 reasoning models.
  LLM_INVOCATION_POLICY:
    model: "gpt-5.2"
    api_surface: "responses"          # Responses API only
    instruction_role: "developer"     # All system-level instructions
    api_key_env_var: "OPENAI_API_KEY" # Never hardcode
    # Parameters inapplicable to GPT-5.2 (DO NOT USE):
    _INAPPLICABLE_temperature: "NOT_USED_FOR_REASONING_MODELS"
    _INAPPLICABLE_top_p: "NOT_USED_FOR_REASONING_MODELS"
    _INAPPLICABLE_max_tokens: "USE_max_output_tokens_INSTEAD"

  # ----------------------------------------------------------------------------
  # 1.3 REASONING EFFORT SCHEDULE (frozen; Task 8 Step 2)
  # UNSPECIFIED IN MANUSCRIPT — frozen here as implementation contract.
  # ----------------------------------------------------------------------------
  REASONING_EFFORT_SCHEDULE:
    # Task 17
    macro_agent:
      effort: "high"
      max_output_tokens: 4096
    # Task 18 — all AC agent types
    ac_equity_agent:
      effort: "high"
      max_output_tokens: 4096
    ac_fi_agent:
      effort: "high"
      max_output_tokens: 4096
    ac_real_assets_agent:
      effort: "high"
      max_output_tokens: 4096
    ac_cash_agent:
      effort: "high"
      max_output_tokens: 2048
    # Task 22
    cma_judge:
      effort: "high"
      max_output_tokens: 4096
    # Task 19 — PC agent subtypes
    pc_generic_agent:
      effort: "medium"
      max_output_tokens: 2048
    pc_researcher_agent:
      effort: "high"
      max_output_tokens: 3072
    pc_adversarial_agent:
      effort: "high"
      max_output_tokens: 2048
    # Task 27
    cro_narrative_agent:
      effort: "high"
      max_output_tokens: 4096
    # Task 28
    peer_review_agent:
      effort: "high"
      max_output_tokens: 3000
    # Task 29
    voting_agent:
      effort: "medium"
      max_output_tokens: 1024
    # Task 30
    top5_revision_agent:
      effort: "high"
      max_output_tokens: 2048
    # Task 31
    cio_agent:
      effort: "xhigh"
      max_output_tokens: 8192
    # Task 36 — robustness baseline (overridden per config)
    robustness_baseline:
      effort: "high"
      max_output_tokens: 4096

  # ----------------------------------------------------------------------------
  # 1.4 AUTOGEN TOPOLOGY PARAMETERS (Tasks 19, 28, 29, 30, 31, 36)
  # ----------------------------------------------------------------------------
  AUTOGEN_TOPOLOGY:
    groupchat_max_round: 200
    human_input_mode: "NEVER"
    speaker_selection_method: "custom"  # StrategyReviewController custom fn
    termination_signal: "TASK_COMPLETE"
    # Phase sequencing (enforced by StrategyReviewController):
    phase_sequence:
      - "A_pc_weight_submission"      # Task 25 + 19 Phase A
      - "B_adversarial_diversifier"   # Task 26 + 19 Phase B
      - "C_cro_reports"               # Task 27 Phase C
      - "D_peer_review"               # Task 28 Phase D
      - "E_voting"                    # Task 29 Phase E
      - "F_top5_revision"             # Task 30 Phase F
      - "G_cio_selection"             # Task 31 Phase G
    # Sequencing constraints (hard; fail if violated):
    sequencing_constraints:
      adversarial_requires_centroid: true       # Phase B after Phase A
      cma_judge_requires_all_ac_complete: true  # Task 22 after Task 18
      cio_requires_top5_revision_complete: true # Phase G after Phase F
      peer_review_requires_all_cro_complete: true # Phase D after Phase C
      voting_requires_simultaneous_release: true  # Phase E after Phase D barrier
    # Parallel dispatch configuration:
    parallel_dispatch:
      max_workers_pc_submission: 8
      max_workers_cro_reports: 8
      max_workers_peer_review: 8
      max_workers_voting: 8
      max_workers_ac_agents: 8
    # PC agent family taxonomy (for diversity constraint and assignment):
    pc_agent_families:
      risk_based:
        - "gmv"
        - "max_diversification"
        - "erc"
        - "min_cvar"
        - "factor_risk_parity"
        - "hrp"
        - "herc"
        - "nco"
        - "cvar_parity"
        - "max_decorrelation"
        - "tail_risk_parity"
      return_based:
        - "max_sharpe"
        - "bl_posterior"
        - "regime_conditional"
        - "robust_mvo"
        - "resampled_mvo"
        - "kelly_fractional"
        - "target_vol_sharpe"
      naive:
        - "equal_weight"
        - "iv_weight"
      adversarial:
        - "adversarial_diversifier"

  # ----------------------------------------------------------------------------
  # 1.5 REACT LOOP PARAMETERS (Tasks 17, 18, 22, 27)
  # ----------------------------------------------------------------------------
  REACT_LOOP_PARAMS:
    macro_agent:
      max_iterations: 20
      termination_tools:
        - "write_macro_view_json"
        - "write_analysis_md"
    ac_equity_agent:
      max_iterations: 30
      termination_tools:
        - "write_cma_methods_json"
        - "write_signals_json"
        - "write_historical_stats_json"
    ac_fi_agent:
      max_iterations: 30
      termination_tools:
        - "write_cma_methods_json"
        - "write_cma_json"
        - "write_signals_json"
        - "write_historical_stats_json"
    ac_real_assets_agent:
      max_iterations: 30
      termination_tools:
        - "write_cma_methods_json"
        - "write_signals_json"
        - "write_historical_stats_json"
    ac_cash_agent:
      max_iterations: 15
      termination_tools:
        - "write_cma_json"
        - "write_historical_stats_json"
        - "write_analysis_md"
    cma_judge:
      max_iterations: 20
      termination_tools:
        - "write_cma_json"
      mandatory_tool_sequence:
        - "load_cma_methods_json"
        - "classify_dispersion"
        - "check_regime_logic"
        - "check_valuation_thresholds"
        - "check_signal_alignment"
        - "enforce_range_constraint"
        - "write_cma_json"
    cro_narrative_agent:
      max_iterations: 20
      termination_tools:
        - "write_cro_report_json"
        - "write_cro_narrative_md"
      mandatory_tool_sequence:
        - "compute_ex_ante_vol"
        - "compute_tracking_error"
        - "compute_backtest_sharpe"
        - "compute_mdd"
        - "run_factor_regression"
        - "check_ips_compliance"
        - "write_cro_report_json"
        - "write_cro_narrative_md"
    top5_revision_agent:
      max_iterations: 10
      termination_tools:
        - "write_pc_weights_json"
        - "confirm_no_revision"
    cio_agent:
      max_iterations: 25
      termination_tools:
        - "write_final_weights_json"
        - "write_board_memo_md"
      mandatory_tool_sequence:
        - "compute_cio_composite_scores"
        - "evaluate_ensemble_methods"
        - "check_ips_compliance_ensemble"
        - "select_best_ensemble"
        - "write_final_weights_json"
        - "write_board_memo_md"

  # ----------------------------------------------------------------------------
  # 1.6 SECURITY AND SANDBOX
  # ----------------------------------------------------------------------------
  SECURITY_PROTOCOLS:
    SANDBOX_ENABLED: true
    PRIVILEGE_SEPARATION: "TIERED_AGENT_PERMISSIONS"
    # LLM agents may NOT: write outside artifact_dir, execute
    # arbitrary code, call APIs not registered as tools.
    # LLM agents MAY: call registered tool callables, read
    # artifact paths passed in their user message.

  # ----------------------------------------------------------------------------
  # 1.7 LOOKAHEAD CONTROLS
  # ----------------------------------------------------------------------------
  LOOKAHEAD_CONTROLS:
    dated_model_required: false
    retrieval_as_of_enforced: true
    web_search_default_enabled: false  # Task 36: enabled only in robustness runs
    web_search_allowed_domains_baseline: []

# ==============================================================================
# 2. DATA CONVENTIONS (PREVENT SILENT DRIFT)
# ==============================================================================
# TASK ALIGNMENT: Task 3 (freeze conventions), Task 10 (calendar cleansing),
#   Task 11 (returns construction), Task 12 (macro cleansing).
# ==============================================================================
DATA_CONVENTIONS:
  base_currency: "USD"
  return_type: "TOTAL_RETURN"
  price_field_for_returns: "total_return_index"
  # Frozen return formula (Task 3 Step 2; UNSPECIFIED IN MANUSCRIPT):
  # r_t = TR_t / TR_{t-1} - 1  (simple periodic returns; NOT log-returns)
  return_formula: "simple_periodic"
  # Frozen annualisation convention (Task 3 Step 3; UNSPECIFIED IN MANUSCRIPT):
  # mu_ann = 12 * mu_mo;  sigma_ann = sqrt(12) * sigma_mo
  annualisation:
    mu_multiplier: 12
    sigma_multiplier: "sqrt(12)"
    periods_per_year: 12
  frequency:
    macro: "M"                  # Monthly
    prices: "D"                 # Daily raw
    returns_for_covariance: "M" # Monthly (Task 3 Step 1)
    cma_horizon_years: 3        # Exhibit 8: 3-year horizon
  resampling_rules:
    # Task 10 Step 2: daily → monthly aggregation rule
    # (UNSPECIFIED IN MANUSCRIPT; frozen as placeholder)
    daily_to_monthly: "last_business_day"
    rf_annualization: "act/365"
  missing_data_policy:
    # Task 12 Step 2: frozen forward-fill/interpolation rules
    # (UNSPECIFIED IN MANUSCRIPT; frozen as placeholders)
    drop_if_missing_ratio_gt: 0.05
    forward_fill_limit: 5
  point_in_time_policy:
    # Task 9 Step 3, Task 12 Step 1
    macro_vintages_required: true
    valuation_as_of_enforced: true
    gdp_vintage_policy: "latest_available_with_approximation_disclaimer"

# ==============================================================================
# 3. RAW UNPROCESSED INPUT DATA SCHEMAS
# ==============================================================================
# TASK ALIGNMENT: Tasks 9–15 validate, cleanse, and align these schemas.
# ==============================================================================
RAW_DATA_SCHEMAS:
  MACRO_DATA:
    dataframe_name: "df_macro_raw"
    index: "DatetimeIndex (Monthly, month-end, timezone-naive)"
    schema:
      real_gdp_growth_rev: "float64"        # Revision-sensitive; Task 12 Step 1
      nonfarm_payrolls_mom: "float64"       # MoM change; raw int64 transformed
      cpi_yoy: "float64"                    # Headline CPI YoY; Task 20 Step 1
      cpi_mom: "float64"                    # Headline CPI MoM; Task 20 Step 1
      cpi_core_yoy: "float64"
      brent_crude_usd: "float64"
      fed_funds_rate: "float64"             # Level; Task 20 Step 1
      fed_funds_3m_change: "float64"        # 3M change; Task 20 Step 1
      financial_conditions_index: "float64" # FCI level; Task 20 Step 1
      financial_conditions_mom: "float64"   # FCI MoM change; Task 20 Step 1
    validation:
      monotonic_increasing: true
      no_duplicate_dates: true
      coverage_through: "AS_OF_DATE"

  MARKET_OHLCV:
    dataframe_name: "df_ohlcv_raw"
    index:
      - "date"
      - "ticker"
      - "investment_universe"
    schema:
      open: "float64"
      high: "float64"
      low: "float64"
      close: "float64"
      volume: "float64"
    validation:
      uniqueness_constraint:
        - "date"
        - "ticker"
        - "investment_universe"
      coverage_through: "AS_OF_DATE"

  TOTAL_RETURN_INDEX:
    dataframe_name: "df_total_return_raw"
    index:
      - "date"
      - "ticker"
      - "investment_universe"
    schema:
      # Strictly positive; no nonsensical jumps (Task 11 Step 1)
      total_return_index: "float64"
    validation:
      strictly_positive: true
      uniqueness_constraint:
        - "date"
        - "ticker"
        - "investment_universe"
      all_18_assets_present: true
      coverage_through: "AS_OF_DATE"

  FUNDAMENTALS:
    dataframe_name: "df_fundamentals_raw"
    index:
      - "date"
      - "ticker"
      - "investment_universe"
    schema:
      # CAPE and P/E in × (Task 13 Step 2; UNSPECIFIED IN MANUSCRIPT)
      cape_ratio: "float64"
      pe_trailing: "float64"
      # Yields in decimals (e.g. 0.03 = 3%; Task 13 Step 2)
      earnings_yield: "float64"
      dividend_yield: "float64"
      buyback_yield: "float64"
      market_cap_usd: "float64"
      # Needed for Inverse Gordon Model (Task 21 Step 2)
      earnings_growth_forecast: "float64"
      valuation_change_assumption: "float64"
    validation:
      equity_only_fields:
        - "cape_ratio"
        - "pe_trailing"
        - "earnings_yield"
      uniqueness_constraint:
        - "date"
        - "ticker"
        - "investment_universe"
      coverage_through: "AS_OF_DATE"

  SIGNALS:
    dataframe_name: "df_signals_raw"
    index:
      - "date"
      - "ticker"
      - "investment_universe"
    schema:
      rsi_14d: "float64"
      momentum_12m: "float64"
      market_breadth_raw: "float64"
      net_fund_flows: "float64"
      positioning_score_raw: "float64"
    validation:
      uniqueness_constraint:
        - "date"
        - "ticker"
        - "investment_universe"
      coverage_through: "AS_OF_DATE"

  BENCHMARK_AND_FACTORS:
    dataframe_name: "df_benchmark_factors_raw"
    index: "DatetimeIndex (Daily, timezone-naive)"
    schema:
      rf: "float64"     # Daily risk-free rate
      mkt_rf: "float64" # Market excess return
      smb: "float64"    # Size factor
      hml: "float64"    # Value factor
    validation:
      monotonic_increasing: true
      no_duplicate_dates: true
      coverage_through: "AS_OF_DATE"
    aggregation_to_monthly:
      # Task 10 Step 2: compound daily factor returns to monthly
      method: "compound"
      rule: "last_business_day"

  BENCHMARK_60_40:
    dataframe_name: "df_benchmark_60_40_raw"
    index: "DatetimeIndex (Daily or Monthly, to be aligned)"
    schema:
      equity_leg_total_return_index: "float64"
      bond_leg_total_return_index: "float64"
      w_equity: "float64"  # Typically 0.60
      w_bond: "float64"    # Typically 0.40
    # Frozen benchmark return formula (Task 5 Step 2; UNSPECIFIED IN MANUSCRIPT):
    # r_b_t = w_eq * r_eq_t + w_bond * r_bond_t
    benchmark_return_formula: "weighted_arithmetic"
    # Frozen TE benchmark representation (Task 5 Step 3; UNSPECIFIED IN MANUSCRIPT):
    # Benchmark is EXTERNAL (two-leg series only); not mapped to 18-asset vector.
    # TE is computed as: sqrt((w - w_b)' Sigma (w - w_b)) where w_b is the
    # two-leg representation projected onto the 18-asset space.
    te_representation: "external_two_leg"
    validation:
      total_return_indices: true
      coverage_through: "AS_OF_DATE"

  SURVEY_CMA:
    dataframe_name: "df_survey_cma_raw"
    index: "DatetimeIndex (Monthly or Quarterly)"
    schema:
      asset_class: "object"
      survey_expected_return: "float64"  # In decimals (e.g. 0.07 = 7%)
    validation:
      coverage_through: "AS_OF_DATE"

  FIXED_INCOME_CURVE_AND_SPREADS:
    dataframe_name: "df_fixed_income_curves_spreads_raw"
    index: "DatetimeIndex (Monthly, month-end)"
    schema:
      ust_3m_yield: "float64"  # In decimals; Task 23
      ust_2y_yield: "float64"
      ust_10y_yield: "float64"
      ust_30y_yield: "float64"
      ig_oas: "float64"        # IG option-adjusted spread; Task 23
      hy_oas: "float64"        # HY OAS; Task 23
      em_spread: "float64"     # EM spread; Task 23
    validation:
      monotonic_increasing: true
      coverage_through: "AS_OF_DATE"

  CPI_SERIES:
    dataframe_name: "df_cpi_index_raw"
    index: "DatetimeIndex (Monthly, month-end)"
    schema:
      cpi_index_level: "float64"  # For real return calculations
    validation:
      strictly_positive: true
      monotonic_increasing: true
      coverage_through: "AS_OF_DATE"

# ==============================================================================
# 4. IPS GOVERNANCE & OBJECTIVES (AS STATED IN MANUSCRIPT)
# ==============================================================================
# TASK ALIGNMENT: Task 1 (validate N=18), Task 4 (freeze constraint
#   computability), Task 15 (universe map validation).
# ==============================================================================
IPS_GOVERNANCE:
  ASSET_UNIVERSE_N: 18  # Task 1: must == len(all asset class lists)
  CATEGORIES:
    - "Equity"
    - "Fixed Income"
    - "Real Assets"
    - "Cash"
  ASSET_CLASSES:
    equity:
      - "US Large Cap"            # 1
      - "US Small Cap"            # 2
      - "US Value"                # 3
      - "US Growth"               # 4
      - "International Developed" # 5
      - "Emerging Markets"        # 6
    fixed_income:
      - "Short-Term Treasuries"        # 7
      - "Intermediate Treasuries"      # 8
      - "Long-Term Treasuries"         # 9
      - "Investment-Grade Corporates"  # 10
      - "High-Yield Corporates"        # 11
      - "International Sovereign Bonds" # 12
      - "International Corporates"     # 13
      - "USD Emerging Market Debt"     # 14
    real_assets:
      - "REITs"       # 15
      - "Gold"        # 16
      - "Commodities" # 17
    cash:
      - "Cash"        # 18
  # Frozen constraint definitions (Task 4):
  CONSTRAINT_DEFINITIONS:
    # Task 4 Step 1: sigma_p = sqrt(w' Sigma w)
    portfolio_vol_formula: "sqrt(w_T_Sigma_w)"
    # Task 4 Step 2: TE = sqrt((w - w_b)' Sigma (w - w_b))
    tracking_error_formula: "sqrt((w_minus_wb)_T_Sigma_(w_minus_wb))"
    # Task 4 Step 3: MDD = min_t(V_t / max_{s<=t}(V_s) - 1)
    max_drawdown_formula: "min_t(V_t_over_running_max_minus_1)"
    # Task 33 Step 1: r_p_t = sum_i(w_i * r_i_t)
    portfolio_return_formula: "weighted_sum_of_asset_returns"
    # Task 32 Step 3: RC_i = w_i(Sigma w)_i / w'Sigma w
    risk_contribution_formula: "w_i_SigmaW_i_over_wT_SigmaW"
  OBJECTIVE:
    TARGET_REAL_RETURN_SPREAD:
      - 0.03
      - 0.04  # CPI + 3–4%
    VOLATILITY_BAND:
      - 0.08
      - 0.12  # 8–12%
    MAX_DRAWDOWN_LIMIT: -0.25  # −25%
  ACTIVE_RISK:
    TRACKING_ERROR_BUDGET_EX_ANTE: 0.06
    BENCHMARK_ID: "benchmark_60_40"
  IMPLEMENTATION_CONSTRAINTS:
    # (UNSPECIFIED IN MANUSCRIPT; frozen as placeholders — Task 25 Step 1)
    long_only: true
    max_weight_per_asset: 0.25
    min_weight_per_asset: 0.00
    cash_allowed: true
  REBALANCING_POLICY:
    frequency: "Quarterly"
    off_cycle_drift_triggers: true
    # Drift threshold UNSPECIFIED IN MANUSCRIPT; frozen as placeholder:
    drift_threshold_l1: 0.05

# ==============================================================================
# 5. REGISTRIES: PER-AGENT INPUT/OUTPUT CONTRACTS AND ARTIFACT PATHS
# ==============================================================================
# TASK ALIGNMENT: Task 16 (output contract schemas), Task 17–19 (agent
#   construction), Task 34 (orchestrator call graph).
#
# DESIGN PRINCIPLE: Each agent type has its own registry entry specifying
# exactly the input paths, output artifact paths, tool callables, and
# schema validators it requires. The orchestrator resolves all paths
# relative to BASE_DIR and STUDY_ID at runtime.
# ==============================================================================
REGISTRIES:

  # ----------------------------------------------------------------------------
  # 5.0 BASE DIRECTORIES
  # ----------------------------------------------------------------------------
  BASE_DIR: "path/to/study_root/"
  AGENTS_DIR: "path/to/study_root/agents/"
  SCRIPTS_DIR: "path/to/study_root/scripts/"
  SCHEMAS_DIR: "path/to/study_root/schemas/"
  SKILLS_DIR: "path/to/study_root/skills/"
  RUN_OUTPUT_BASE_DIR: "path/to/study_root/run_outputs/self-driving-portfolio-march-2026/"
  RUN_MANIFEST_PATH: "path/to/study_root/run_outputs/self-driving-portfolio-march-2026/run_manifest.json"

  # Artifact subdirectory structure (resolved at runtime by orchestrator):
  ARTIFACT_STRUCTURE:
    macro: "{RUN_OUTPUT_BASE_DIR}/macro/"
    ac_agents: "{RUN_OUTPUT_BASE_DIR}/ac_agents/{asset_class_slug}/"
    cma_judge: "{RUN_OUTPUT_BASE_DIR}/cma_judge/{asset_class_slug}/"
    covariance: "{RUN_OUTPUT_BASE_DIR}/covariance/"
    pc_agents: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{method_slug}/"
    cro_reports: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{method_slug}/"
    peer_reviews: "{RUN_OUTPUT_BASE_DIR}/peer_reviews/"
    voting: "{RUN_OUTPUT_BASE_DIR}/voting/"
    top5_revision: "{RUN_OUTPUT_BASE_DIR}/top5_revision/{method_slug}/"
    cio: "{RUN_OUTPUT_BASE_DIR}/cio/"
    exhibits: "{RUN_OUTPUT_BASE_DIR}/exhibits/"
    robustness: "{RUN_OUTPUT_BASE_DIR}/robustness/{run_id}/"

  # ----------------------------------------------------------------------------
  # 5.1 MACRO AGENT REGISTRY (Task 17)
  # Framework: ReAct
  # ----------------------------------------------------------------------------
  MACRO_AGENT:
    framework: "ReAct"
    description_file: "{AGENTS_DIR}/macro/AGENT.md"
    prompt_template_key: "MACRO_AGENT"
    llm_policy_key: "macro_agent"  # → REASONING_EFFORT_SCHEDULE
    inputs:
      df_macro_raw: "df_macro_raw"                    # In-memory DataFrame
      as_of_date: "AS_OF_DATE"                        # From STUDY_CONFIG
      ips_text_or_path: "{AGENTS_DIR}/ips/IPS.md"
      prior_macro_view_path: null                     # None on first run
    tools:
      fetch_macro_snapshot: "{SCRIPTS_DIR}/macro/fetch_macro_snapshot.py"
      score_growth_dimension: "{SCRIPTS_DIR}/macro/score_growth_dimension.py"
      score_inflation_dimension: "{SCRIPTS_DIR}/macro/score_inflation_dimension.py"
      score_policy_dimension: "{SCRIPTS_DIR}/macro/score_policy_dimension.py"
      score_financial_conditions_dimension: "{SCRIPTS_DIR}/macro/score_financial_conditions_dimension.py"
      classify_regime: "{SCRIPTS_DIR}/macro/classify_regime.py"
      write_macro_view_json: "{SCRIPTS_DIR}/macro/write_macro_view_json.py"
      write_analysis_md: "{SCRIPTS_DIR}/macro/write_analysis_md.py"
    output_artifact_dir: "{RUN_OUTPUT_BASE_DIR}/macro/"
    output_artifacts:
      macro_view_json: "{RUN_OUTPUT_BASE_DIR}/macro/macro-view.json"
      analysis_md: "{RUN_OUTPUT_BASE_DIR}/macro/analysis.md"
    output_schemas:
      macro_view_json: "{SCHEMAS_DIR}/macro_view.schema.json"
    react_params_key: "macro_agent"  # → REACT_LOOP_PARAMS

  # ----------------------------------------------------------------------------
  # 5.2 AC AGENT REGISTRY — per asset class (Task 18)
  # Framework: ReAct (independent parallel loops)
  # ----------------------------------------------------------------------------
  AC_AGENTS:
    framework: "ReAct"
    llm_policy_key_equity: "ac_equity_agent"
    llm_policy_key_fi: "ac_fi_agent"
    llm_policy_key_real: "ac_real_assets_agent"
    llm_policy_key_cash: "ac_cash_agent"

    # Common inputs for all AC agents:
    common_inputs:
      df_total_return_raw: "df_total_return_raw"      # In-memory DataFrame
      df_signals_raw: "df_signals_raw"
      df_fundamentals_raw: "df_fundamentals_raw"
      df_survey_cma_raw: "df_survey_cma_raw"
      as_of_date: "AS_OF_DATE"
      macro_view_json: "{RUN_OUTPUT_BASE_DIR}/macro/macro-view.json"
      rf: "derived_from_df_benchmark_factors_raw"
