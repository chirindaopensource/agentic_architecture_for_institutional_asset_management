  # ----------------------------------------------------------------------------
  COVARIANCE_AGENT:
    framework: "script_only"
    inputs:
      df_total_return_raw: "df_total_return_raw"
      as_of_date: "AS_OF_DATE"
      window_months: 120  # From METHODOLOGY_PARAMS
      estimator: "SHRINKAGE_LEDOIT_WOLF"
      psd_repair: "eigenvalue_clipping"
    scripts:
      build_returns_matrix: "{SCRIPTS_DIR}/covariance/build_returns_matrix.py"
