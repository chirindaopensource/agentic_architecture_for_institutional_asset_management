# PROVENANCE METADATA:
#   "VERBATIM": must match manuscript excerpt exactly — no edits permitted.
#   "INFERRED":  engineered to operationalise described workflow; not printed
#                verbatim in manuscript.
#
# LLM INVOCATION PARAMETERS: each template key maps to a
