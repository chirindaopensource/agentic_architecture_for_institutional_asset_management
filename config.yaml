  # ----------------------------------------------------------------------------
  # 5.6 CRO AGENT REGISTRY (Task 27)
  # Framework: ReAct (per candidate), coordinated by AutoGen controller
  # ----------------------------------------------------------------------------
  CRO_AGENT:
    framework: "ReAct"
    coordination: "AutoGen_StrategyReviewController_Phase_C"
    prompt_template_key: "CRO_AGENT_RISK_REPORT"
    llm_policy_key: "cro_narrative_agent"
    react_params_key: "cro_narrative_agent"
    # Inputs per candidate (resolved at runtime):
    inputs_per_candidate:
      pc_weights_json: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{method_slug}/pc_weights.json"
      ips_text_or_path: "{AGENTS_DIR}/ips/IPS.md"
      benchmark_def_path: "{AGENTS_DIR}/benchmark/benchmark_60_40.json"
      sigma_npy: "{RUN_OUTPUT_BASE_DIR}/covariance/sigma.npy"
      returns_matrix: "{RUN_OUTPUT_BASE_DIR}/covariance/returns_matrix.parquet"
      factors_df: "df_benchmark_factors_raw_monthly"  # Aggregated in-memory
      rf: "derived_from_df_benchmark_factors_raw"
      benchmark_weights: "{AGENTS_DIR}/benchmark/benchmark_weights_18asset.npy"
    tools:
      compute_ex_ante_vol: "{SCRIPTS_DIR}/cro/compute_ex_ante_vol.py"
      compute_tracking_error: "{SCRIPTS_DIR}/cro/compute_tracking_error.py"
      compute_backtest_sharpe: "{SCRIPTS_DIR}/cro/compute_backtest_sharpe.py"
      compute_mdd: "{SCRIPTS_DIR}/cro/compute_mdd.py"
      run_factor_regression: "{SCRIPTS_DIR}/cro/run_factor_regression.py"
      check_ips_compliance: "{SCRIPTS_DIR}/cro/check_ips_compliance.py"
      write_cro_report_json: "{SCRIPTS_DIR}/cro/write_cro_report_json.py"
      write_cro_narrative_md: "{SCRIPTS_DIR}/cro/write_cro_narrative_md.py"
    # Outputs per candidate:
    output_artifact_dir_template: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{method_slug}/"
    output_artifacts_template:
      cro_report_json: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{method_slug}/cro_report.json"
      cro_narrative_md: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{method_slug}/cro_narrative.md"
    output_schemas:
      cro_report_json: "{SCHEMAS_DIR}/cro_report.schema.json"
    # Aggregate summary output (across all 21 candidates):
    aggregate_output_artifacts:
      cro_risk_reports_json: "{RUN_OUTPUT_BASE_DIR}/cro_reports/cro_risk_reports.json"
      cro_risk_reports_md: "{RUN_OUTPUT_BASE_DIR}/cro_reports/cro_risk_reports.md"

  # ----------------------------------------------------------------------------
  # 5.7 PEER REVIEW REGISTRY (Task 28)
  # Framework: AutoGen (parallel dispatch with synchronisation barrier)
  # ----------------------------------------------------------------------------
  PEER_REVIEW:
    framework: "AutoGen"
    topology_role: "ConversableAgent (PC agents)"
    controller: "StrategyReviewController_Phase_D"
    prompt_template_key: "PEER_REVIEW"
    llm_policy_key: "peer_review_agent"
    assignment_seed_key: "peer_review_assignment_seed"  # → RANDOM_SEEDS
    reviews_per_agent: 2
    review_types:
      - "intra_category"
      - "inter_category"
    total_reviews_expected: 42  # 21 agents × 2 reviews each
    simultaneous_release: true
    max_workers: 8
    # Inputs per reviewer (resolved at runtime):
    inputs_per_reviewer:
      reviewer_pc_weights_json: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{reviewer_slug}/pc_weights.json"
      reviewer_pc_report_md: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{reviewer_slug}/pc_report.md"
      peer_pc_weights_json: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{peer_slug}/pc_weights.json"
      peer_pc_report_md: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{peer_slug}/pc_report.md"
      peer_cro_report_json: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{peer_slug}/cro_report.json"
      macro_view_json: "{RUN_OUTPUT_BASE_DIR}/macro/macro-view.json"
      ips_text_or_path: "{AGENTS_DIR}/ips/IPS.md"
    # Outputs:
    output_artifact_dir: "{RUN_OUTPUT_BASE_DIR}/peer_reviews/"
    output_artifact_name_template: "peer_reviews/{reviewer_slug}_reviews_{peer_slug}.md"
    assignment_artifact: "{RUN_OUTPUT_BASE_DIR}/peer_reviews/assignment_matrix.json"
    synchronisation_barrier:
      count_gate: "total_produced == 42"
      schema_gate: "each_review_nonempty_and_contains_completion_signal"
      release_mechanism: "atomic_directory_move_or_flag"
      on_barrier_failure: "raise_RuntimeError_halt_pipeline"

  # ----------------------------------------------------------------------------
  # 5.8 VOTING REGISTRY (Task 29)
  # Framework: AutoGen (parallel dispatch, forced tool_choice)
  # ----------------------------------------------------------------------------
  VOTING:
    framework: "AutoGen"
    topology_role: "ConversableAgent (PC agents)"
    controller: "StrategyReviewController_Phase_E"
    prompt_template_key: "VOTING_SUBMISSION"
    llm_policy_key: "voting_agent"
    forced_tool_call:
      type: "function"
      name: "submit_vote"
    max_workers: 8
    total_votes_expected: 21
    # Inputs per voter (resolved at runtime):
    inputs_per_voter:
      all_peer_reviews_dir: "{RUN_OUTPUT_BASE_DIR}/peer_reviews/"
      all_cro_reports_json: "{RUN_OUTPUT_BASE_DIR}/cro_reports/cro_risk_reports.json"
      macro_view_json: "{RUN_OUTPUT_BASE_DIR}/macro/macro-view.json"
      ips_text_or_path: "{AGENTS_DIR}/ips/IPS.md"
      candidate_list: "derived_from_PC_METHOD_REGISTRY"
    # Vote schema:
    vote_schema:
      voter_id: "string"
      top_5: "list[{method: string, score: int in [1,2,3,4,5]}]"
      bottom_flag: "optional {method: string, penalty: -2}"
    self_vote_guard: "raise_RuntimeError_on_self_vote_detection"
    # Output:
    output_artifact_dir: "{RUN_OUTPUT_BASE_DIR}/voting/"
    output_artifacts:
      vote_corpus_json: "{RUN_OUTPUT_BASE_DIR}/voting/vote_corpus.json"
      composite_ranking_json: "{RUN_OUTPUT_BASE_DIR}/voting/composite_ranking.json"
    voting_barrier:
      count_gate: "len(votes) == 21"
      on_barrier_failure: "raise_RuntimeError_halt_pipeline"
    # Scripted aggregation (no LLM):
    borda_script: "{SCRIPTS_DIR}/voting/compute_borda_aggregation.py"
    composite_script: "{SCRIPTS_DIR}/voting/compute_composite_ranking.py"
    # Regime-dependent alpha (UNSPECIFIED IN MANUSCRIPT; frozen here):
    alpha_schedule:
      Expansion: 0.5
      Late-cycle: 0.6  # More weight on peer judgment in late-cycle
      Recession: 0.4   # More weight on quantitative metrics in recession
      Recovery: 0.5

  # ----------------------------------------------------------------------------
  # 5.9 TOP-5 REVISION REGISTRY (Task 30)
  # Framework: AutoGen (selective dispatch to 5 agents)
  # ----------------------------------------------------------------------------
  TOP5_REVISION:
    framework: "AutoGen"
    topology_role: "ConversableAgent (top-5 PC agents only)"
    controller: "StrategyReviewController_Phase_F"
    prompt_template_key: "TOP5_REVISION"
    llm_policy_key: "top5_revision_agent"
    react_params_key: "top5_revision_agent"
    diversity_constraint:
      required_families_in_top5: 3
      total_families: 4
      script: "{SCRIPTS_DIR}/voting/apply_diversity_constraint.py"
    # Inputs per top-5 agent (resolved at runtime):
    inputs_per_agent:
      current_pc_weights_json: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{method_slug}/pc_weights.json"
      current_pc_report_md: "{RUN_OUTPUT_BASE_DIR}/pc_agents/{method_slug}/pc_report.md"
      cro_report_json: "{RUN_OUTPUT_BASE_DIR}/cro_reports/{method_slug}/cro_report.json"
      received_reviews_dir: "{RUN_OUTPUT_BASE_DIR}/peer_reviews/"
      composite_ranking_json: "{RUN_OUTPUT_BASE_DIR}/voting/composite_ranking.json"
      top5_selection_json: "{RUN_OUTPUT_BASE_DIR}/top5_revision/top5_selection.json"
      sigma_npy: "{RUN_OUTPUT_BASE_DIR}/covariance/sigma.npy"
      cma_dir: "{RUN_OUTPUT_BASE_DIR}/cma_judge/"
      ips_text_or_path: "{AGENTS_DIR}/ips/IPS.md"
    tools:
      run_optimizer: "{SCRIPTS_DIR}/pc/run_optimizer.py"
      check_ips_compliance: "{SCRIPTS_DIR}/pc/check_ips_compliance.py"
